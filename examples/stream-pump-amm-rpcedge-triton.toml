[run]
profile = "pump_amm_transactions_v1"
target_matched_signatures = 50000
minimum_match_sources = 2
startup_timeout_seconds = 30
stall_timeout_seconds = 30
completion_grace_seconds = 30
maximum_wall_seconds = 900

[measurement]
public_ip = "REPLACE_WITH_MEASUREMENT_HOST_IP"
region = "REPLACE_WITH_REGION"
datacenter = "REPLACE_WITH_DATACENTER_OR_FACILITY"

[[sources]]
name = "rpcedge_deshred"
provider = "RPCEdge"
kind = "deshred"
endpoint_env = "SOLBENCH_RPCEDGE_GRPC_URL"
token_env = "SOLBENCH_RPCEDGE_GRPC_TOKEN"
required = true
clock_comparability = "unverified"

[[sources]]
name = "rpcedge_processed"
provider = "RPCEdge"
kind = "processed"
endpoint_env = "SOLBENCH_RPCEDGE_GRPC_URL"
token_env = "SOLBENCH_RPCEDGE_GRPC_TOKEN"
required = true
clock_comparability = "unverified"

[[sources]]
name = "triton_deshred"
provider = "Triton"
kind = "deshred"
endpoint_env = "SOLBENCH_TRITON_GRPC_URL"
token_env = "SOLBENCH_TRITON_GRPC_TOKEN"
required = true
clock_comparability = "unverified"

[[sources]]
name = "triton_processed"
provider = "Triton"
kind = "processed"
endpoint_env = "SOLBENCH_TRITON_GRPC_URL"
token_env = "SOLBENCH_TRITON_GRPC_TOKEN"
required = true
clock_comparability = "unverified"
