name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt · clippy · test (${{ matrix.features }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        features:
          - ""
          - "grpc,send"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.features }}
      - name: fmt
        if: matrix.features == '' && matrix.os == 'ubuntu-latest'
        run: cargo fmt --all --check
      - name: clippy
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo clippy --all-targets -- -D warnings
          else
            cargo clippy --all-targets --features "${{ matrix.features }}" -- -D warnings
          fi
      - name: test
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo test --all
          else
            cargo test --all --features "${{ matrix.features }}"
          fi
      - name: release build
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo build --release -p solbench
          else
            cargo build --release -p solbench --features "${{ matrix.features }}"
          fi

  docs:
    name: docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps --document-private-items
