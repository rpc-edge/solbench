# Build + attach solbench binaries on version tags (v0.1.0, …).
# Create a release: git tag v0.1.0 && git push origin v0.1.0
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: solbench-x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: solbench-aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: solbench-x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p solbench
      - name: Stage artifact
        run: |
          BIN=target/${{ matrix.target }}/release/solbench
          test -x "$BIN"
          STAGE="${{ matrix.artifact }}"
          mkdir -p dist
          cp "$BIN" "dist/solbench"
          tar -C dist -czf "${STAGE}.tar.gz" solbench
          shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  publish:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -exec cp {} release/ \;
          ls -la release/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
          body: |
            ## Install

            Download the binary for your platform, extract, and put `solbench` on your `PATH`.

            ```sh
            # or build from source
            cargo install --git https://github.com/rpc-edge/solbench solbench
            ```

            ## Quick start

            ```sh
            solbench probe
            solbench report --region "your-region" --window "1h" > run.json
            ```

            Leaderboard feed schema matches [rpcedge.com/benchmarks/live](https://rpcedge.com/benchmarks/live).
            Publish co-located runs only — laptop geography is not infra.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
