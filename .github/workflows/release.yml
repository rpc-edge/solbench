# Build + attach solbench binaries on version tags (v0.1.1, …).
# Create a release: git tag v0.1.2 && git push origin v0.1.2
#
# Full-feature builds (grpc+send) for linux x86_64 and macOS aarch64.
# Intel macOS ships default features only (probe/serve/report) — cross-building
# openssl-sys for grpc/send from Apple Silicon is not supported on GH runners.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: solbench-x86_64-unknown-linux-gnu
            features: "grpc,send"
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: solbench-aarch64-apple-darwin
            features: "grpc,send"
          # Lean binary only (no openssl native deps) — cross-build from aarch64 host.
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: solbench-x86_64-apple-darwin
            features: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}-${{ matrix.features }}
      - name: Build release binary
        run: |
          FEATURES="${{ matrix.features }}"
          if [ -n "$FEATURES" ]; then
            cargo build --release --target ${{ matrix.target }} -p solbench --features "$FEATURES"
          else
            cargo build --release --target ${{ matrix.target }} -p solbench
          fi
      - name: Stage artifact
        run: |
          BIN=target/${{ matrix.target }}/release/solbench
          test -x "$BIN"
          STAGE="${{ matrix.artifact }}"
          mkdir -p dist
          cp "$BIN" "dist/solbench"
          tar -C dist -czf "${STAGE}.tar.gz" solbench
          shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
          FEATURES="${{ matrix.features }}"
          printf '%s\n' "features=${FEATURES:-default}" "target=${{ matrix.target }}" \
            > "${STAGE}.buildinfo"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
            ${{ matrix.artifact }}.buildinfo

  publish:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.sha256' -o -name '*.buildinfo' \) \
            -exec cp {} release/ \;
          ls -la release/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
          body: |
            ## Install

            Download the binary for your platform, extract, and put `solbench` on your `PATH`.

            | Artifact | Features |
            |---|---|
            | `solbench-x86_64-unknown-linux-gnu` | `grpc` + `send` (full) |
            | `solbench-aarch64-apple-darwin` | `grpc` + `send` (full) |
            | `solbench-x86_64-apple-darwin` | default only (`probe`/`report`/`serve`) |

            ```sh
            # From source
            cargo install --git https://github.com/rpc-edge/solbench solbench
            cargo install --git https://github.com/rpc-edge/solbench solbench --features "grpc,send"
            ```

            ## Quick start

            ```sh
            solbench probe
            solbench report --region "your-region" --window "1h" > run.json
            solbench stream check-config --config examples/stream-pump-amm-rpcedge-triton.toml
            ```

            Label your region honestly - laptop geography is not co-located infra.

            Maintained by [rpc edge](https://rpcedge.com). Optional product access:
            [app.rpcedge.com/signup](https://app.rpcedge.com/signup).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
