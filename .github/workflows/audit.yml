name: Audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly Monday 06:00 UTC — catch new advisories without waiting for a PR.
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rustsec:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Official rustsec action installs cargo-audit and runs it against Cargo.lock.
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
